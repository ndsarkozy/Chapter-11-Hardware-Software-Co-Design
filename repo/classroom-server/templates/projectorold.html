<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ class_name }} – Projector</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080b14;--card:#10152a;--card2:#181e35;--text:#e8ecff;--muted:#5a6490;
  --blue:#4b6bfb;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--purple:#a371f7;--border:#1e2440}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;
  display:grid;grid-template-rows:44px 1fr;height:100vh;overflow:hidden}
.top-bar{background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:14px;padding:0 18px}
.top-bar .brand{font-size:16px;font-weight:700;color:var(--blue)}
.main{display:grid;grid-template-columns:1fr 420px;overflow:hidden}
/* Tile wall */
.tiles-pane{overflow-y:auto;padding:12px;border-right:2px solid var(--border)}
.tile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px}
.tile{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:8px;font-size:11px}
.tile.on{border-color:var(--green)}
.tile.off{opacity:.45}
.slot-num{font-size:18px;font-weight:700;color:var(--blue)}
.kv{display:flex;justify-content:space-between;margin-top:2px;font-size:10px}
.kv span:first-child{color:var(--muted)}
/* Right pane */
.info-pane{display:flex;flex-direction:column;gap:10px;padding:14px;overflow-y:auto}
.counters{display:flex;gap:20px;justify-content:center}
.counter{text-align:center}
.counter .big{font-size:3rem;font-weight:800;line-height:1}
.counter .lbl{font-size:10px;color:var(--muted);margin-top:3px}
.counter.sub .big{color:var(--blue)}
.counter.avg .big{color:var(--green)}
.counter.bon .big{color:var(--amber)}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px}
.step-badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:12px;font-weight:700;background:var(--purple);color:#fff;margin-bottom:6px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-lbl{font-size:10px;color:var(--muted);width:40px;text-align:right;flex-shrink:0}
.bar-track{flex:1;background:var(--card2);border-radius:3px;height:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .5s}
.lb-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.bcast-box{background:#1a2a00;border:1px solid var(--green);border-radius:7px;padding:10px 14px;font-weight:600;color:var(--green);display:none}
.pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.pill-b{background:#0d2149;color:var(--blue);border:1px solid #1f4d99}
</style>
</head>
<body>
<div class="top-bar">
  <span class="brand">{{ class_name }}</span>
  <span id="step-pill" class="pill pill-b">{{ active_lesson }}</span>
  <span style="margin-left:auto;font-size:11px;color:var(--muted)" id="clock"></span>
  <span id="tile-count" style="font-size:11px;color:var(--muted)"></span>
</div>
<div class="main">
  <!-- Device tiles -->
  <div class="tiles-pane">
    <div class="tile-grid" id="tile-grid"></div>
  </div>
  <!-- Info pane -->
  <div class="info-pane">
    <div class="bcast-box" id="bcast-box"></div>

    <div class="counters">
      <div class="counter sub"><div class="big" id="cnt-sub">0</div><div class="lbl">submitted / {{ slot_count }}</div></div>
      <div class="counter avg"><div class="big" id="cnt-avg">—</div><div class="lbl">avg score</div></div>
      <div class="counter bon"><div class="big" id="cnt-bon">0</div><div class="lbl">bonus ★</div></div>
    </div>

    <!-- Active step info -->
    <div class="card">
      <div class="step-badge" id="proj-section"></div>
      <div style="font-size:16px;font-weight:700;margin-bottom:3px" id="proj-title">{{ active_lesson }}</div>
      <div style="font-size:12px;color:var(--muted)" id="proj-subtitle">Waiting for submissions…</div>
      <div style="font-size:11px;color:var(--muted);margin-top:10px">QUESTION</div>
      <div style="font-size:13px;line-height:1.6;margin-top:4px" id="proj-question">—</div>
    </div>

    <!-- Score histogram -->
    <div class="card">
      <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:8px">Score distribution</div>
      <div class="bar-row"><span class="bar-lbl">90–100</span><div class="bar-track"><div class="bar-fill" id="bar-A" style="width:0%;background:var(--green)"></div></div><span id="cnt-A" style="font-size:11px;width:18px">0</span></div>
      <div class="bar-row"><span class="bar-lbl">70–89</span><div class="bar-track"><div class="bar-fill" id="bar-B" style="width:0%;background:#16a34a"></div></div><span id="cnt-B" style="font-size:11px;width:18px">0</span></div>
      <div class="bar-row"><span class="bar-lbl">50–69</span><div class="bar-track"><div class="bar-fill" id="bar-C" style="width:0%;background:var(--amber)"></div></div><span id="cnt-C" style="font-size:11px;width:18px">0</span></div>
      <div class="bar-row"><span class="bar-lbl">0–49</span><div class="bar-track"><div class="bar-fill" id="bar-F" style="width:0%;background:var(--red)"></div></div><span id="cnt-F" style="font-size:11px;width:18px">0</span></div>
    </div>

    <!-- Leaderboard -->
    <div class="card" style="flex:1;overflow-y:auto">
      <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:8px">Leaderboard</div>
      <div id="lb-body"></div>
    </div>
  </div>
</div>

<script>
const CLASS_ID   = {{ class_id | tojson }};
const SLOT_COUNT = {{ slot_count }};
const STEPS      = {{ steps | tojson }};
let submissions  = [];
let devices      = {};
let lessonState  = {active_step:0,unlocked_steps:[0]};

function grade(p){return p>=90?'A':p>=70?'B':p>=50?'C':'F'}
function barColor(p){return p>=90?'var(--green)':p>=70?'#16a34a':p>=50?'var(--amber)':'var(--red)'}

function apply(s){
  submissions = submissions.filter(x=>x.slot!==s.slot);
  submissions.push(s);
  render();
}

function render(){
  const n   = submissions.length;
  const avg = n ? Math.round(submissions.reduce((a,s)=>a+s.pct,0)/n) : null;
  const bon = submissions.filter(s=>s.bonus).length;
  document.getElementById('cnt-sub').textContent = n;
  document.getElementById('cnt-avg').textContent = avg!==null?avg+'%':'—';
  document.getElementById('cnt-bon').textContent = bon;

  // Step info
  const step = lessonState.active_step??0;
  const s    = STEPS[step]||{};
  document.getElementById('step-pill').textContent     = s.section||('Step '+step);
  document.getElementById('proj-section').textContent  = s.section||('Step '+step);
  document.getElementById('proj-title').textContent    = s.title||'';
  document.getElementById('proj-subtitle').textContent = s.subtitle||'';
  document.getElementById('proj-question').textContent = s.question?.text||'—';

  // Histogram
  const bins={A:0,B:0,C:0,F:0};
  submissions.forEach(s=>bins[grade(s.pct)]++);
  const mx=Math.max(...Object.values(bins),1);
  ['A','B','C','F'].forEach(g=>{
    document.getElementById(`bar-${g}`).style.width=(bins[g]/mx*100)+'%';
    document.getElementById(`cnt-${g}`).textContent=bins[g];
  });

  // Leaderboard
  const sorted=[...submissions].sort((a,b)=>b.pct-a.pct);
  document.getElementById('lb-body').innerHTML=sorted.map(s=>`
    <div class="lb-row">
      <span>#${s.slot}${s.student&&s.student!=='slot_'+s.slot?' · '+s.student:''}</span>
      <div style="flex:1;margin:0 8px;background:var(--card2);border-radius:3px;height:6px;overflow:hidden;align-self:center">
        <div style="width:${s.pct}%;height:100%;background:${barColor(s.pct)};border-radius:3px"></div>
      </div>
      <span style="color:${barColor(s.pct)};font-weight:700">${s.pct}%${s.bonus?' ★':''}</span>
    </div>`).join('');

  // Device tiles
  const devList=Object.values(devices).sort((a,b)=>a.slot-b.slot);
  let online=0;
  document.getElementById('tile-grid').innerHTML=devList.map(dev=>{
    if(dev.online)online++;
    const hu=dev.humidity_pct!=null?dev.humidity_pct.toFixed(1)+'%':'--';
    const te=dev.temp_c!=null?dev.temp_c.toFixed(1)+'°C':'--';
    const fsmColor=dev.fsm_state==='SENSOR_FAULT'?'color:var(--red)':dev.fsm_state==='NORMAL'?'color:var(--green)':(dev.fsm_state||'').includes('ALERT')?'color:var(--amber)':'';
    return `<div class="tile ${dev.online?'on':'off'}">
      <div style="display:flex;justify-content:space-between">
        <span class="slot-num">#${dev.slot}</span>
        <span style="font-size:10px">${dev.online?'🟢':'🔴'}</span>
      </div>
      ${dev.student_id?`<div style="color:var(--amber);font-size:9px">${dev.student_id}</div>`:''}
      <div class="kv"><span>H</span><span>${hu}</span></div>
      <div class="kv"><span>T</span><span>${te}</span></div>
      ${dev.fsm_state?`<div class="kv"><span>FSM</span><span style="${fsmColor}">${dev.fsm_state}</span></div>`:''}
    </div>`;
  }).join('');
  document.getElementById('tile-count').textContent=`${online}/${devList.length} online`;
  setInterval(()=>document.getElementById('clock').textContent=new Date().toLocaleTimeString(),1000);
}

// SSE
const es = new EventSource(`/${CLASS_ID}/stream`);
es.onmessage = e => {
  const ev = JSON.parse(e.data);
  if (ev.type==='snapshot'){
    submissions=[]; devices=ev.devices||{};
    ev.submissions.forEach(s=>apply(s));
    render();
  } else if (ev.type==='submission') {
    apply(ev);
  } else if (ev.type==='device_assigned'||ev.type==='device_status'||ev.type==='sensor') {
    const ss=String(ev.slot);
    devices[ss]=Object.assign(devices[ss]||{slot:ev.slot},ev);
    render();
  } else if (ev.type==='step_unlocked'||ev.type==='step_changed') {
    lessonState.active_step=ev.step;
    lessonState.unlocked_steps=ev.unlocked_steps||lessonState.unlocked_steps;
    render();
  } else if (ev.type==='broadcast') {
    const b=document.getElementById('bcast-box');
    if(ev.message){b.style.display='block';b.textContent='📢 '+ev.message;}
    else b.style.display='none';
  } else if (ev.type==='session_cleared'||ev.type==='devices_reset') {
    submissions=[];devices={};render();
  }
};

// Poll lesson state as backup
async function pollState(){
  try{
    const r=await fetch(`/${CLASS_ID}/api/state`);
    const d=await r.json();
    lessonState=d.lesson||lessonState;
    if(d.devices){devices=d.devices;}
    render();
  }catch(e){}
}
pollState();
setInterval(pollState,8000);
</script>
</body>
</html>
